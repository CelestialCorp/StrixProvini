<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <!-- Font moderni -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/dashboard" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/feedback" class="nav-link"><i class="fas fa-comment"></i> Feedback</a>
            <a href="/export" class="nav-link"><i class="fas fa-download"></i> Esporta</a>
            <a href="/classifica" class="nav-link"><i class="fas fa-trophy"></i> Classifica</a>
            <a href="/votazione" class="nav-link"><i class="fas fa-vote-yea"></i> Votazione</a>
            <a href="/logout" class="nav-link logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy; 2025 - Dashboard Strix - Creato da @Gatto_six</p>
    </footer>
</body>
</html>
